voxel_down_size: 0.01
filter: statistical_outlier_removal
kwargs_for_filter:
  nb_neighbors: 10
  std_ratio: 4.0
using_density_adaptation_in_skeletonization: True
skeletonization: 
  category: thinning
  core_algorithm: spconv_based_contraction
  core_algorithm_kwargs:
    ckpt_path: ckpts/for_leafon_seasons.pth
    batch_size: 16
    max_iteration: 10
    device: cuda
    voxel_size: 0.01
    cube_size: 4.0
    buffer_size: 0.4
    monitored_by_chamfer_distance: True
  voxel_size_for_downsampling: 0.01
  edge_search_kwargs: 
    r: 0.055
  edge_weight_function: l1
  topology_extractor: spt
refinement: 
  trusted_aboveground_height: 1.3
  trusted_height_ratio: 0.2
  min_radius_weight: !!float 1.0e-6
  x0_on_gamma_pdf: ~
  y0_on_gamma_pdf: ~
  wpl_based_correction_fn_for_radius_weights: "lambda radius_weights, wpls: radius_weights * (np.log(wpls + 1.0) / np.log(np.max(wpls) + 1.0))"
  min_radius: !!float 1.0e-3
  occupancy_factor_or_buffer: 1.1
  smoother_kwargs:
    weight_fem_pos_deviation: !!float 1.0e10
    weight_path_length: 1.0
    weight_ref_deviation: 1.0
    bound: 0.055
  radius_tolerance: 0.0
  using_allometric_equation: False
  trunk_intercept_initval: 0.0
  trunk_intercept_minval: 0.0
  trunk_intercept_maxval : !!float 1.0e10
  lam_intercept_minval: 1.0
  lam_intercept_maxval: 100.0
  lam_intercept_tuning_function: "lambda wpl, wpl_max, lam_lb, lam_ub: (lam_lb / lam_ub) ** (np.log(wpl + 1.0) / np.log(wpl_max + 1.0)) * lam_ub"
  min_num_credible_samples: 5
  making_twigs_thinner: True
modeling:
  num_sectional_vertices: 20
  using_furcation_optimization: True
  min_radius: !!float 1.0e-3
  resolution: 0.01
  range_multiplier: 2.75
  num_sectional_vertices_for_optimization: 12
  rdp_epsilon: 0.01
  num_hermite_nodes: 8